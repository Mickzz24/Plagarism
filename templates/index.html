<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="layout-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <h2>PlagiGuardAI</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-link active">
                    <span class="nav-icon">📊</span>
                    Dashboard
                </a>
                <a href="/profile" class="nav-link">
                    <span class="nav-icon">👤</span>
                    Profile
                </a>
                <a href="/settings" class="nav-link">
                    <span class="nav-icon">⚙️</span>
                    Settings
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round">
                            <span class="icon sun">☀️</span>
                            <span class="icon moon">🌙</span>
                        </div>
                    </label>
                </div>
                <button id="logout-btn" class="logout-btn">
                    <span class="nav-icon">🚪</span>
                    Log Out
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area container">
            <header>
                <h1>Plagiarism Checker</h1>
                <p>Verify your text against our local database using AI-powered NLP.</p>
            </header>

            <section class="checker-card glass">
                <form id="checker-form">
                    <div class="input-group">
                        <label for="text-input">Enter Text Array</label>
                        <textarea id="text-input" name="text"
                            placeholder="Type or paste the text you want to check for plagiarism here..." rows="8"
                            required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="file-upload" class="file-label">Or upload a .txt file (Optional)</label>
                        <input type="file" id="file-upload" accept=".txt" class="file-input">
                    </div>

                    <button type="submit" id="submit-btn" class="btn primary-btn">
                        <span class="btn-text">Check Plagiarism</span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                </form>

                <div id="error-message" class="error-msg hidden"></div>
            </section>

            <section id="results-section" class="results-card glass hidden">
                <h2>Results</h2>
                <div class="score-container">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845
                        a 15.9155 15.9155 0 0 1 0 31.831
                        a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="score-circle" stroke-dasharray="0, 100" d="M18 2.0845
                        a 15.9155 15.9155 0 0 1 0 31.831
                        a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                    </svg>
                    <div class="verdict" id="verdict-text">Looking Good!</div>
                </div>

                <div class="details-section" id="details-section">
                    <h3>Document Breakdown</h3>
                    <ul id="details-list" class="details-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Check Auth State on Main Page Load
        if (!localStorage.getItem('jwtToken')) {
            window.location.href = '/login';
        }

        // Logout functionality
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('jwtToken');
            window.location.href = '/login';
        });
    </script>
</body>

</html>
